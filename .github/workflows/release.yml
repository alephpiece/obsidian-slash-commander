name: Release Obsidian Plugin

on:
  push:
    tags:
    - '[0-9]*.[0-9]*.[0-9]*'

env:
  PLUGIN_NAME: slash-commander

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0 # otherwise, you will failed to push refs to dest repo

    - name: Validate release tag
      run: |
        if [[ ! "${GITHUB_REF_NAME}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
          echo "Invalid release tag: ${GITHUB_REF_NAME}"
          exit 1
        fi

    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22.x'

    - name: Enable Corepack
      run: corepack enable

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Check
      run: pnpm build:check

    - name: Build
      id: build
      run: |
        pnpm build
        mkdir ${{ env.PLUGIN_NAME }}
        cp main.js manifest.json styles.css README.md ${{ env.PLUGIN_NAME }}
        zip -r ${{ github.event.repository.name }}-${{ github.ref_name }}.zip ${{ env.PLUGIN_NAME }}
        echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        draft: false
        prerelease: false
        files: |
          ${{ github.event.repository.name }}-${{ github.ref_name }}.zip
          main.js
          manifest.json
          styles.css
        token: ${{ secrets.GITHUB_TOKEN }}
